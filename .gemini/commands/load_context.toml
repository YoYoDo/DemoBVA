description = "Load all agent skills, memories, and project configurations into Gemini context"

prompt = """
---
description: Load all agent skills, memories, and project configurations into Gemini context
---

# /load_context - Gemini 預載入上下文

## 用途

將專案的技能、記憶、命令和規範載入 Gemini CLI 上下文，確保 AI 助手擁有完整的專案知識。

## 預加載層級清單 (L1-L5)

按優先順序加載，使用相對路徑確保可移植性。

---

### L1: 基礎記憶系統

**步驟 1**: 讀取環境配置
```bash
cat .env
```

**步驟 2**: 讀取通用代理技能
```bash
cat .agents/skills/**/*.md 2>/dev/null || echo "No agent skills found"
```

**步驟 3**: 讀取共享記憶
```bash
cat .agents/memory/*.md
```

預期載入：
- `shared-context.md` - 專案共享上下文
- `decisions.md` - 架構決策記錄
- `gemini_3_analysis.md` - Gemini 模型分析

---

### L2: Gemini 命令系統

**步驟 4**: 列出可用的 Gemini 命令
```bash
ls -la .gemini/commands/*.toml
```

預期載入 10 個 speckit 命令：
- `speckit.specify.toml`
- `speckit.clarify.toml`
- `speckit.plan.toml`
- `speckit.plan-uiux.toml`
- `speckit.tasks.toml`
- `speckit.taskstoissues.toml`
- `speckit.implement.toml`
- `speckit.analyze.toml`
- `speckit.checklist.toml`
- `speckit.constitution.toml`

---

### L3: 規範系統 (Project Specifications)

**步驟 5**: 讀取規範知識庫
```bash
cat .specify/memory/*.md 2>/dev/null || echo "No specify memory found"
```

**步驟 6**: 讀取規範模板（可選）
```bash
ls .specify/templates/*.md 2>/dev/null
```

---

### L4: Claude 記憶系統 (跨工具參考)

**步驟 7**: 讀取 Claude 記憶（可選，用於跨工具同步）
```bash
cat .claude/memory/discoveries.md 2>/dev/null
cat .claude/memory/learned-skills.md 2>/dev/null
```

---

### L5: 專案狀態

**步驟 8**: 檢查 Git 狀態
```bash
git status --short
git branch --show-current
```

**步驟 9**: 列出現有規格目錄
```bash
ls -la specs/ 2>/dev/null || echo "No specs directory"
```

---

## 配置引用

| 層級 | 位置 | 用途 | Gemini 優先級 |
|-----|------|------|--------------|
| **L1** | `.agents/memory/` | 共享記憶 | ⭐⭐⭐⭐⭐ 最高 |
| **L2** | `.gemini/commands/` | Gemini 命令 | ⭐⭐⭐⭐⭐ 最高 |
| **L3** | `.specify/` | 項目規範 | ⭐⭐⭐⭐ 高 |
| **L4** | `.claude/memory/` | Claude 記憶 | ⭐⭐⭐ 中 |
| **L5** | Git/Specs | 專案狀態 | ⭐⭐ 低 |

---

## 快速載入指令

### 完整載入（推薦）
```bash
# 一次性載入所有必要上下文
cat .env .agents/memory/*.md .specify/memory/*.md 2>/dev/null
```

### 最小載入
```bash
# 僅載入共享記憶
cat .agents/memory/shared-context.md .agents/memory/decisions.md
```

### 載入特定功能的規格
```bash
# 載入特定功能的所有文件
cat specs/[feature-name]/*.md
```

---

## 載入完成確認

載入完成後，請確認以下項目：

- [ ] 專案名稱和路徑已識別
- [ ] 共享記憶已載入（3 個檔案）
- [ ] Gemini 命令已可用（10 個 speckit）
- [ ] 規範模板路徑已知
- [ ] Git 分支狀態已確認

---

## 與其他工具的差異

| 功能 | Gemini (本檔案) | Antigravity | Claude Code |
|------|----------------|-------------|-------------|
| 載入指令 | `/load_context` | `/load_context` | `[系統初始化]` |
| 檔案格式 | TOML | Markdown | Markdown |
| 執行方式 | bash 指令 | turbo 標記 | 自動 |
| 共享記憶 | ✅ | ✅ | ✅ |
| 專用記憶 | ❌ | ❌ | ✅ (8 檔案) |

---

## 版本追蹤

- **建立日期**: 2026-02-01
- **格式版本**: Gemini CLI TOML
- **路徑方式**: 相對路徑 (可移植)
- **參考**: CLAUDE.md, .agent/workflows/load_context.md
"""
